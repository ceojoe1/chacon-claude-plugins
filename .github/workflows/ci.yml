name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Pin actions to commit SHAs for supply-chain safety. The trailing comment
# documents the released tag at the time of pinning so future bumps can be
# audited. Use `pin-github-action` (or Dependabot github-actions ecosystem)
# to update.
permissions:
  contents: read

jobs:
  lint:
    name: Syntax + manifest checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # node:sqlite was unflagged in Node 24. Earlier 22.x needs
          # --experimental-sqlite which we'd rather not pepper everywhere.
          node-version: '24'
          cache: npm
          cache-dependency-path: plugins/chacon-travel/playwright/package-lock.json

      - name: Install playwright runtime deps
        working-directory: plugins/chacon-travel/playwright
        run: npm ci --ignore-scripts

      - name: Validate JSON manifests
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('plugins/chacon-travel/.claude-plugin/plugin.json','utf8'))"

      - name: Verify plugin.json and marketplace.json versions match
        run: |
          PLUGIN_V=$(node -p "require('./plugins/chacon-travel/.claude-plugin/plugin.json').version")
          MARKET_V=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")
          if [ "$PLUGIN_V" != "$MARKET_V" ]; then
            echo "Version mismatch: plugin.json=$PLUGIN_V, marketplace.json=$MARKET_V"
            exit 1
          fi
          echo "Version: $PLUGIN_V"

      - name: Syntax-check JS entry points
        run: |
          node --check plugins/chacon-travel/playwright/search.js
          node --check plugins/chacon-travel/playwright/trip.js
          node --check plugins/chacon-travel/playwright/import.js
          node --check plugins/chacon-travel/mcp/travel-db.js

      - name: Verify CLI loads
        working-directory: plugins/chacon-travel/playwright
        run: |
          node --no-warnings ./trip.js list || true
          node --no-warnings ./search.js 2>&1 | grep -q "category must be one of" && echo "search.js usage shown"
